<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg:        #0d0d0d;
        --surface:   #161616;
        --border:    #242424;
        --border-hi: #383838;
        --text:      #e8e3d8;
        --muted:     #505050;
        --subtle:    #282828;
        --accent:    #f0b429;
        --accent-lo: rgba(240, 180, 41, 0.12);
        --green:     #52c97a;
        --danger:    #e05555;
        --radius:    10px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 56px 20px 80px;
      }

      /* subtle noise overlay */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(ellipse 80% 60% at 50% -10%, rgba(240,180,41,0.05) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      .app {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 540px;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 40px;
      }

      h1 {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 2.6rem;
        letter-spacing: -0.03em;
        color: var(--text);
        line-height: 1;
      }

      .date-label {
        font-size: 0.75rem;
        font-weight: 400;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ── Input row ── */
      .input-row {
        display: flex;
        align-items: center;
        gap: 0;
        margin-bottom: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        transition: border-color 0.2s;
      }

      .input-row:focus-within {
        border-color: var(--border-hi);
      }

      input[type="text"]#new-todo {
        flex: 1;
        padding: 14px 16px;
        background: transparent;
        border: none;
        outline: none;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--text);
      }

      input[type="text"]#new-todo::placeholder {
        color: var(--muted);
      }

      .divider {
        width: 1px;
        height: 20px;
        background: var(--border);
        flex-shrink: 0;
      }

      #new-duration {
        width: 72px;
        padding: 14px 10px;
        background: transparent;
        border: none;
        outline: none;
        font-family: 'Space Mono', monospace;
        font-size: 0.8rem;
        color: var(--muted);
        text-align: center;
        transition: color 0.15s;
      }

      #new-duration:focus {
        color: var(--text);
      }

      #new-duration::placeholder {
        color: var(--muted);
        opacity: 0.6;
      }

      #new-duration::-webkit-inner-spin-button,
      #new-duration::-webkit-outer-spin-button { -webkit-appearance: none; }

      button.add-btn {
        padding: 12px 18px;
        background: var(--accent);
        color: #0d0d0d;
        border: none;
        font-family: 'DM Sans', sans-serif;
        font-size: 1.3rem;
        font-weight: 500;
        cursor: pointer;
        line-height: 1;
        transition: background 0.15s, transform 0.1s;
        flex-shrink: 0;
      }

      button.add-btn:hover { background: #f5c040; }
      button.add-btn:active { transform: scale(0.96); }

      /* ── Filters ── */
      .filters {
        display: flex;
        gap: 0;
        margin-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }

      .filters button {
        padding: 8px 0;
        margin-right: 24px;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        transition: color 0.15s, border-color 0.15s;
      }

      .filters button:hover { color: var(--text); }

      .filters button.active {
        color: var(--text);
        border-bottom-color: var(--accent);
      }

      /* ── Todo list ── */
      .todo-list {
        list-style: none;
        margin-top: 4px;
      }

      /* ── Todo item ── */
      .todo-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 4px 14px 16px;
        border-bottom: 1px solid var(--border);
        border-left: 3px solid transparent;
        transition: border-left-color 0.2s, background 0.2s, opacity 0.2s;
        animation: fade-in 0.18s ease;
        position: relative;
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .todo-item:hover {
        background: rgba(255,255,255,0.02);
      }

      .todo-item.done {
        opacity: 0.45;
      }

      .todo-item.timebox-active {
        border-left-color: var(--accent);
        background: var(--accent-lo);
      }

      /* ── Custom checkbox ── */
      .todo-item input[type="checkbox"] {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border: 1.5px solid var(--muted);
        border-radius: 50%;
        cursor: pointer;
        flex-shrink: 0;
        position: relative;
        transition: border-color 0.2s, background 0.2s;
      }

      .todo-item input[type="checkbox"]:hover {
        border-color: var(--green);
      }

      .todo-item input[type="checkbox"]:checked {
        background: var(--green);
        border-color: var(--green);
      }

      .todo-item input[type="checkbox"]:checked::after {
        content: '';
        display: block;
        width: 4px;
        height: 7px;
        border: 1.5px solid #0d0d0d;
        border-top: none;
        border-left: none;
        position: absolute;
        top: 2.5px;
        left: 5.5px;
        transform: rotate(45deg);
      }

      /* ── Todo text ── */
      .todo-item > span {
        flex: 1;
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--text);
        line-height: 1.4;
        transition: color 0.2s;
      }

      .todo-item.done > span {
        text-decoration: line-through;
        color: var(--muted);
      }

      /* ── Timebox badge ── */
      .timebox-badge {
        font-family: 'Space Mono', monospace;
        font-size: 0.7rem;
        color: var(--muted);
        letter-spacing: 0.02em;
        flex-shrink: 0;
      }

      /* ── Countdown ── */
      .timebox-countdown {
        font-family: 'Space Mono', monospace;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
        min-width: 48px;
        text-align: right;
        flex-shrink: 0;
        letter-spacing: 0.02em;
      }

      .timebox-countdown.urgent {
        color: var(--danger);
        animation: blink 1s step-start infinite;
      }

      @keyframes blink {
        50% { opacity: 0.4; }
      }

      /* ── Timer buttons ── */
      .todo-item button.timebox-start,
      .todo-item button.timebox-pause,
      .todo-item button.timebox-resume,
      .todo-item button.timebox-stop {
        background: none;
        border: 1px solid var(--border-hi);
        border-radius: 6px;
        cursor: pointer;
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        padding: 4px 8px;
        color: var(--muted);
        transition: all 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .todo-item button.timebox-start:hover,
      .todo-item button.timebox-resume:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .todo-item button.timebox-pause:hover {
        border-color: var(--text);
        color: var(--text);
      }

      .todo-item button.timebox-stop:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      .todo-item button.timebox-start:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }

      /* ── Delete button ── */
      .todo-item button.delete-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: transparent;
        font-size: 0.85rem;
        padding: 4px 6px;
        border-radius: 4px;
        transition: color 0.15s;
        flex-shrink: 0;
        line-height: 1;
      }

      .todo-item:hover button.delete-btn {
        color: var(--muted);
      }

      .todo-item button.delete-btn:hover {
        color: var(--danger) !important;
      }

      /* ── Empty state ── */
      .empty {
        padding: 48px 0;
        text-align: center;
        color: var(--muted);
        font-size: 0.875rem;
        letter-spacing: 0.04em;
        border-bottom: 1px solid var(--border);
        animation: fade-in 0.2s ease;
      }

      /* ── Footer ── */
      .footer {
        margin-top: 20px;
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <h1>Focus.</h1>
        <span class="date-label" id="date-label"></span>
      </div>

      <div class="input-row">
        <input type="text" id="new-todo" placeholder="What needs to happen..." autocomplete="off" />
        <div class="divider"></div>
        <input type="number" id="new-duration" placeholder="min" min="1" max="999" />
        <button class="add-btn" id="add-btn">+</button>
      </div>

      <div class="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="active">Active</button>
        <button data-filter="done">Done</button>
      </div>

      <ul class="todo-list" id="todo-list"></ul>
      <p class="footer" id="footer"></p>
    </div>

    <script>
      // Render today's date
      const d = new Date();
      document.getElementById('date-label').textContent =
        d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
