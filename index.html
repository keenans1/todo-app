<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 48px 16px;
      }

      .app {
        width: 100%;
        max-width: 480px;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 24px;
        color: #111;
      }

      .input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }

      input[type="text"] {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="text"]:focus { border-color: #555; }

      button.add-btn {
        padding: 10px 18px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      button.add-btn:hover { background: #333; }

      .filters {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .filters button {
        padding: 6px 14px;
        border: 1px solid #ddd;
        border-radius: 20px;
        background: #fff;
        cursor: pointer;
        font-size: 0.875rem;
        transition: all 0.15s;
      }

      .filters button.active {
        background: #111;
        color: #fff;
        border-color: #111;
      }

      .todo-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .todo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 12px 14px;
      }

      .todo-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: #111;
      }

      .todo-item span {
        flex: 1;
        font-size: 1rem;
        color: #111;
        transition: color 0.15s;
      }

      .todo-item.done span {
        text-decoration: line-through;
        color: #aaa;
      }

      .todo-item button.delete-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: #bbb;
        font-size: 1.1rem;
        line-height: 1;
        padding: 2px 4px;
        border-radius: 4px;
        transition: color 0.15s;
      }

      .todo-item button.delete-btn:hover { color: #e00; }

      .empty {
        text-align: center;
        color: #aaa;
        padding: 32px 0;
        font-size: 0.95rem;
      }

      .footer {
        margin-top: 16px;
        font-size: 0.8rem;
        color: #aaa;
      }

      #new-duration {
        width: 70px;
        padding: 10px 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.15s;
      }

      #new-duration:focus { border-color: #555; }

      #new-duration::-webkit-inner-spin-button,
      #new-duration::-webkit-outer-spin-button { -webkit-appearance: none; }

      .timebox-badge {
        font-size: 0.75rem;
        color: #888;
        background: #f0f0f0;
        border-radius: 12px;
        padding: 2px 8px;
        white-space: nowrap;
      }

      .timebox-countdown {
        font-size: 0.9rem;
        font-weight: 600;
        color: #111;
        font-variant-numeric: tabular-nums;
        min-width: 44px;
        text-align: right;
      }

      .timebox-countdown.urgent { color: #c00; }

      .todo-item.timebox-active {
        border-color: #111;
        box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
      }

      .todo-item button.timebox-start,
      .todo-item button.timebox-pause,
      .todo-item button.timebox-resume,
      .todo-item button.timebox-stop {
        background: none;
        border: 1px solid #ddd;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.8rem;
        padding: 3px 8px;
        color: #555;
        transition: all 0.15s;
        white-space: nowrap;
      }

      .todo-item button.timebox-start:hover,
      .todo-item button.timebox-resume:hover { border-color: #111; color: #111; }
      .todo-item button.timebox-stop:hover { border-color: #e00; color: #e00; }
      .todo-item button.timebox-pause:hover { border-color: #555; color: #333; }
      .todo-item button.timebox-start:disabled { opacity: 0.35; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>Todo</h1>
      <div class="input-row">
        <input type="text" id="new-todo" placeholder="Add a task..." />
        <input type="number" id="new-duration" placeholder="min" min="1" max="999" />
        <button class="add-btn" id="add-btn">Add</button>
      </div>
      <div class="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="active">Active</button>
        <button data-filter="done">Done</button>
      </div>
      <ul class="todo-list" id="todo-list"></ul>
      <p class="footer" id="footer"></p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
